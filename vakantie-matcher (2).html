<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Photo Test</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #111; color: #fff; }
img { width: 300px; height: 200px; object-fit: cover; margin: 10px; }
.box { background: #222; padding: 15px; margin: 10px 0; border-radius: 8px; }
.ok { color: #4fc; } .err { color: #f55; }
</style>
</head>
<body>
<h2>🔍 Google Places API Test</h2>
<div id="log"></div>
<div id="photos"></div>

<script>
const KEY = 'AIzaSyC7Y8wfy2xxevGT3_KM9mQ9YpC9HqY1W98';
const log = document.getElementById('log');
const photos = document.getElementById('photos');

function msg(text, ok) {
  const d = document.createElement('div');
  d.className = 'box ' + (ok ? 'ok' : 'err');
  d.textContent = text;
  log.appendChild(d);
}

async function test() {
  msg('🔄 Testing Places API (New) for "Dubrovnik Croatia"...', true);
  
  try {
    const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Goog-Api-Key': KEY,
        'X-Goog-FieldMask': 'places.id,places.displayName,places.photos'
      },
      body: JSON.stringify({ textQuery: 'Dubrovnik Croatia tourism' })
    });

    msg('HTTP status: ' + resp.status + ' ' + resp.statusText, resp.ok);
    
    const data = await resp.json();
    msg('Response: ' + JSON.stringify(data).substring(0, 300), resp.ok);

    if (data.error) {
      msg('❌ ERROR: ' + data.error.message + ' (code ' + data.error.code + ')', false);
      return;
    }

    const place = data.places?.[0];
    if (!place) { msg('❌ No places found', false); return; }
    
    msg('✅ Found: ' + place.displayName?.text, true);
    msg('Photos available: ' + (place.photos?.length || 0), true);

    if (place.photos?.length) {
      place.photos.slice(0, 3).forEach((p, i) => {
        const url = `https://places.googleapis.com/v1/${p.name}/media?maxWidthPx=800&key=${KEY}`;
        msg('Photo ' + (i+1) + ' URL: ' + url.substring(0, 80) + '...', true);
        const img = document.createElement('img');
        img.src = url;
        img.onerror = () => msg('❌ Photo ' + (i+1) + ' failed to load', false);
        img.onload = () => msg('✅ Photo ' + (i+1) + ' loaded!', true);
        photos.appendChild(img);
      });
    }
  } catch(e) {
    msg('❌ FETCH ERROR: ' + e.message, false);
    msg('This usually means CORS is blocking the request', false);
  }
}

test();
</script>
</body>
</html>
